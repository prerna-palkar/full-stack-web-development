<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student ERP Attendance System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

/* HEADER */
.header{
  background:#1f2a44;
  color:white;
  padding:15px;
  font-size:18px;
  font-weight:bold;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 55px);
}

/* LEFT PANEL */
.sidebar{
  width:300px;
  background:white;
  border-right:1px solid #ddd;
  padding:15px;
  overflow:auto;
}

.student-card{
  padding:10px;
  border:1px solid #eee;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

.student-card:hover{
  background:#f0f0f0;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* PROFILE */
.profile{
  background:white;
  padding:15px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:15px;
}

.profile h2{
  margin:0;
}

/* TAG */
.tag{
  display:inline-block;
  padding:3px 8px;
  border-radius:20px;
  font-size:12px;
  margin-right:5px;
}

.blue{background:#dbe9ff;color:#1d4ed8;}
.green{background:#dcfce7;color:#166534;}
.orange{background:#fff7ed;color:#c2410c;}

/* SUBJECT */
.subject{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  border:1px solid #ddd;
}

.bar{
  height:8px;
  background:#eee;
  border-radius:10px;
  margin-top:8px;
}

.fill{
  height:8px;
  background:#4caf50;
  border-radius:10px;
}

/* DOCS */
.docs{
  background:white;
  padding:15px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:10px;
}

.doc-item{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">🎓 Student ERP Attendance System</div>

<div class="container">

<!-- STUDENT LIST -->
<div class="sidebar" id="studentList"></div>

<!-- DETAILS -->
<div class="main">

  <div class="profile" id="profile"></div>

  <div id="attendance"></div>

  <div class="docs">
    <h3>📄 Documents</h3>
    <div id="docs"></div>
  </div>

</div>

</div>

<script>
window.onload = function(){

/* SAMPLE STUDENTS */
let students = [
  {
    name:"Rahul Sharma",
    fullName:"Rahul Rajesh Sharma",
    blood:"B+",
    category:"General",
    branch:"Computer Science",
    year:"2nd Year",
    attendance:[
      {sub:"DSA",att:42,total:50},
      {sub:"OS",att:38,total:50},
      {sub:"DBMS",att:44,total:50}
    ],
    docs:["Aadhaar Card","College ID","Passport Photo"]
  },

  {
    name:"Priya Mehta",
    fullName:"Priya Amit Mehta",
    blood:"O+",
    category:"OBC",
    branch:"IT",
    year:"3rd Year",
    attendance:[
      {sub:"DSA",att:45,total:50},
      {sub:"OS",att:40,total:50},
      {sub:"DBMS",att:47,total:50}
    ],
    docs:["Aadhaar Card","Marksheet","ID Card"]
  }
];

let selected = 0;

/* RENDER STUDENTS */
function renderStudents(){
  let box = document.getElementById("studentList");
  box.innerHTML = "";

  students.forEach((s,i)=>{
    box.innerHTML += `
      <div class="student-card" onclick="selectStudent(${i})">
        <b>${s.name}</b><br>
        <small>${s.branch}</small>
      </div>
    `;
  });
}

/* SELECT STUDENT */
window.selectStudent = function(i){
  selected = i;
  renderProfile();
  renderAttendance();
  renderDocs();
}

/* PROFILE */
function renderProfile(){
  let s = students[selected];

  document.getElementById("profile").innerHTML = `
    <h2>${s.fullName}</h2>
    <p>${s.branch} - ${s.year}</p>

    <span class="tag blue">Blood: ${s.blood}</span>
    <span class="tag green">${s.category}</span>
  `;
}

/* ATTENDANCE */
function renderAttendance(){
  let s = students[selected];
  let box = document.getElementById("attendance");

  box.innerHTML = "";

  s.attendance.forEach(a=>{
    let percent = Math.round((a.att/a.total)*100);

    box.innerHTML += `
      <div class="subject">
        <b>${a.sub}</b> - ${percent}%
        <div class="bar">
          <div class="fill" style="width:${percent}%"></div>
        </div>
        <small>${a.att} / ${a.total}</small>
      </div>
    `;
  });
}

/* DOCUMENTS */
function renderDocs(){
  let s = students[selected];
  let box = document.getElementById("docs");

  box.innerHTML = "";

  s.docs.forEach(d=>{
    box.innerHTML += `<div class="doc-item">📄 ${d}</div>`;
  });
}

/* INIT */
renderStudents();
renderProfile();
renderAttendance();
renderDocs();

};
</script>

</body>
</html>
