<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ClubVerse Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top,#1e1b4b,#020617);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:26px;
  font-weight:bold;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}

/* CLUB GRID */
.clubs{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 20px #6366f1;
}

/* IMAGE */
.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

/* CONTENT */
.card-content{
  padding:12px;
}

/* BUTTON */
button{
  width:100%;
  padding:8px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button.joined{
  background:#22c55e;
  cursor:default;
}

/* FEED */
.feed{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:15px;
  backdrop-filter:blur(10px);
}

.feed-item{
  background:#111827;
  padding:10px;
  border-radius:10px;
  margin:8px 0;
  animation:fade 0.4s;
}

/* ALERT */
.alert{
  position:fixed;
  top:20px;
  right:20px;
  background:#22c55e;
  padding:10px;
  border-radius:10px;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="header">🎉 ClubVerse Pro</div>

<div class="container">

<!-- CLUBS -->
<div class="clubs" id="clubs"></div>

<!-- ACTIVITY FEED -->
<div class="feed">
  <h3>🔥 Activity Feed</h3>
  <div id="feedList"></div>
</div>

</div>

<script>

let studentName = "Rahul"; // simulate logged-in user

let clubs = [
  {name:"Coding Club", img:"https://images.unsplash.com/photo-1518770660439-4636190af475", members:10, joined:false},
  {name:"Dance Club", img:"https://images.unsplash.com/photo-1508804185872-d7badad00f7d", members:8, joined:false},
  {name:"Photography", img:"https://images.unsplash.com/photo-1492724441997-5dc865305da7", members:6, joined:false},
  {name:"Music Club", img:"https://images.unsplash.com/photo-1511379938547-c1f69419868d", members:12, joined:false}
];

let feed = [];

/* ALERT */
function showAlert(msg){
  let d=document.createElement("div");
  d.className="alert";
  d.innerText=msg;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),2000);
}

/* JOIN */
function joinClub(i){

  if(clubs[i].joined) return;

  clubs[i].joined = true;
  clubs[i].members++;

  // ADD FEED UPDATE
  let message = `👤 ${studentName} joined ${clubs[i].name}`;
  feed.unshift(message);

  showAlert("🎉 Joined " + clubs[i].name);

  render();
}

/* RENDER CLUBS */
function renderClubs(){

  let box=document.getElementById("clubs");
  box.innerHTML="";

  clubs.forEach((c,i)=>{

    box.innerHTML += `
      <div class="card">
        <img src="${c.img}">
        <div class="card-content">
          <h3>${c.name}</h3>
          <p>${c.members} Members</p>

          <button class="${c.joined?'joined':''}" 
            onclick="joinClub(${i})">
            ${c.joined ? "Joined ✓" : "Join Club"}
          </button>
        </div>
      </div>
    `;
  });
}

/* RENDER FEED */
function renderFeed(){

  let box=document.getElementById("feedList");
  box.innerHTML="";

  feed.forEach(f=>{
    box.innerHTML += `<div class="feed-item">${f}</div>`;
  });
}

/* MAIN RENDER */
function render(){
  renderClubs();
  renderFeed();
}

/* INIT */
render();

</script>

</body>
</html>
