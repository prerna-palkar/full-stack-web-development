<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactPro - Smart Contact Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;

            --light-bg: #f9fafb;
            --light-card: #ffffff;
            --light-text: #1f2937;
            --light-text-sec: #6b7280;
            --light-border: #e5e7eb;

            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-text: #f1f5f9;
            --dark-text-sec: #cbd5e1;
            --dark-border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--light-text);
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        body.dark-mode {
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }

        /* ========== HEADER ========== */
        header {
            background-color: var(--light-card);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        body.dark-mode header {
            background-color: var(--dark-card);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .app-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .app-subtitle {
            font-size: 0.9rem;
            color: var(--light-text-sec);
            margin-top: 0.3rem;
        }

        body.dark-mode .app-subtitle {
            color: var(--dark-text-sec);
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-icon {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            padding: 0.5rem;
        }

        .btn-icon:hover {
            transform: scale(1.15);
        }

        /* ========== CONTAINER ========== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ========== CONTROLS SECTION ========== */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 0.9rem;
            border: 2px solid var(--light-border);
            border-radius: 8px;
            font-size: 0.95rem;
            background-color: var(--light-card);
            color: var(--light-text);
            transition: all 0.3s ease;
        }

        body.dark-mode .search-input {
            background-color: var(--dark-card);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .filter-select {
            padding: 0.9rem;
            border: 2px solid var(--light-border);
            border-radius: 8px;
            background-color: var(--light-card);
            color: var(--light-text);
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        body.dark-mode .filter-select {
            background-color: var(--dark-card);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            padding: 0.9rem 1.8rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background-color: var(--light-border);
            color: var(--light-text);
        }

        body.dark-mode .btn-secondary {
            background-color: var(--dark-border);
            color: var(--dark-text);
        }

        .btn-secondary:hover {
            background-color: #d1d5db;
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #dc2626;
            transform: translateY(-2px);
        }

        /* ========== TABS ========== */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--light-border);
            flex-wrap: wrap;
        }

        body.dark-mode .tabs {
            border-bottom-color: var(--dark-border);
        }

        .tab {
            padding: 0.8rem 1.5rem;
            background: none;
            border: none;
            color: var(--light-text-sec);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        body.dark-mode .tab {
            color: var(--dark-text-sec);
        }

        .tab:hover {
            color: var(--primary);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* ========== CONTACTS GRID ========== */
        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== CONTACT CARD ========== */
        .contact-card {
            background-color: var(--light-card);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        body.dark-mode .contact-card {
            background-color: var(--dark-card);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .contact-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        body.dark-mode .contact-card:hover {
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.2);
        }

        .contact-card.favorite {
            border: 2px solid var(--warning);
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.05) 0%, transparent 100%);
        }

        .contact-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .contact-favorite-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .contact-favorite-btn:hover {
            transform: scale(1.2);
        }

        .contact-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--light-text);
        }

        body.dark-mode .contact-name {
            color: var(--dark-text);
        }

        .contact-category {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background-color: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .contact-info-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.9rem;
            color: var(--light-text-sec);
        }

        body.dark-mode .contact-info-item {
            color: var(--dark-text-sec);
        }

        .contact-icons {
            display: flex;
            gap: 0.8rem;
            font-size: 1.2rem;
        }

        .contact-actions {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--light-border);
        }

        body.dark-mode .contact-actions {
            border-top-color: var(--dark-border);
        }

        .contact-actions button {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .btn-edit {
            background-color: var(--primary);
            color: white;
        }

        .btn-edit:hover {
            background-color: var(--primary-dark);
        }

        .btn-delete {
            background-color: var(--danger);
            color: white;
        }

        .btn-delete:hover {
            background-color: #dc2626;
        }

        /* ========== MODAL ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--light-card);
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body.dark-mode .modal-content {
            background-color: var(--dark-card);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--light-border);
        }

        body.dark-mode .modal-header {
            border-bottom-color: var(--dark-border);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .modal-close:hover {
            transform: scale(1.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--light-text);
        }

        body.dark-mode .form-label {
            color: var(--dark-text);
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--light-border);
            border-radius: 8px;
            font-size: 0.95rem;
            background-color: white;
            color: var(--light-text);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        body.dark-mode .form-input,
        body.dark-mode .form-select,
        body.dark-mode .form-textarea {
            background-color: var(--dark-bg);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .form-buttons button {
            flex: 1;
            padding: 0.9rem;
        }

        /* ========== PROFILE MODAL ========== */
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 2rem;
            margin: 0 auto 1rem;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .profile-category {
            padding: 0.4rem 1rem;
            background-color: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .profile-details {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .profile-detail-item {
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--light-border);
        }

        body.dark-mode .profile-detail-item {
            border-bottom-color: var(--dark-border);
        }

        .profile-detail-label {
            font-size: 0.85rem;
            color: var(--light-text-sec);
            font-weight: 600;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        body.dark-mode .profile-detail-label {
            color: var(--dark-text-sec);
        }

        .profile-detail-value {
            font-size: 1.05rem;
            color: var(--light-text);
            word-break: break-word;
        }

        body.dark-mode .profile-detail-value {
            color: var(--dark-text);
        }

        .profile-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .profile-actions button {
            flex: 1;
            padding: 0.9rem;
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--light-text-sec);
        }

        body.dark-mode .empty-state {
            color: var(--dark-text-sec);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--light-text);
        }

        body.dark-mode .empty-title {
            color: var(--dark-text);
        }

        .empty-text {
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        /* ========== TOAST NOTIFICATIONS ========== */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            color: var(--light-text);
            animation: slideInUp 0.3s ease;
            z-index: 1001;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast.info {
            border-left: 4px solid var(--primary);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1024px) {
            .contacts-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 1.5rem;
            }

            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }

            .header-actions {
                justify-content: center;
            }

            .container {
                padding: 1rem;
            }

            .controls {
                flex-direction: column;
            }

            .search-input,
            .filter-select,
            .btn {
                width: 100%;
            }

            .contacts-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                width: 95%;
                padding: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .tabs {
                overflow-x: auto;
            }

            .profile-actions {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .app-title {
                font-size: 1.5rem;
            }

            .contact-card {
                padding: 1rem;
            }

            .modal-content {
                padding: 1.2rem;
            }

            .profile-avatar {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }

            .empty-icon {
                font-size: 3rem;
            }

            .toast {
                left: 1rem;
                right: 1rem;
                bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- ========== HEADER ========== -->
    <header>
        <div class="header-content">
            <div>
                <h1 class="app-title">📇 ContactPro</h1>
                <p class="app-subtitle">Stay Connected, Stay Organized</p>
                <p class="app-subtitle" style="margin-top: 0.3rem; font-size: 0.8rem; color: #999;">by Prerna Palkar</p>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="themeToggle" title="Toggle Dark Mode">🌙</button>
                <button class="btn btn-primary" onclick="openAddContactModal()">+ Add Contact</button>
            </div>
        </div>
    </header>

    <!-- ========== MAIN CONTENT ========== -->
    <div class="container">
        <!-- Controls -->
        <div class="controls">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="Search contacts by name..."
            >
            <select class="filter-select" id="filterSelect">
                <option value="all">All Contacts</option>
                <option value="favorites">⭐ Favorites</option>
                <option value="family">👨‍👩‍👧 Family</option>
                <option value="friends">👯 Friends</option>
                <option value="work">💼 Work</option>
            </select>
            <select class="filter-select" id="sortSelect">
                <option value="name-asc">Sort: A-Z</option>
                <option value="name-desc">Sort: Z-A</option>
                <option value="recent">Sort: Recent</option>
            </select>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchView('all')">All Contacts</button>
            <button class="tab" onclick="switchView('list')">List View</button>
        </div>

        <!-- Contacts Grid/List -->
        <div class="contacts-grid" id="contactsContainer">
            <div class="empty-state">
                <div class="empty-icon">📞</div>
                <h3 class="empty-title">No contacts yet</h3>
                <p class="empty-text">Start adding contacts to get organized!</p>
                <button class="btn btn-primary" onclick="openAddContactModal()">+ Add Your First Contact</button>
            </div>
        </div>
    </div>

    <!-- ========== ADD/EDIT CONTACT MODAL ========== -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add New Contact</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>

            <form id="contactForm" onsubmit="handleContactSubmit(event)">
                <div class="form-group">
                    <label class="form-label">Full Name *</label>
                    <input type="text" class="form-input" id="contactName" placeholder="John Doe" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Phone Number *</label>
                        <input type="tel" class="form-input" id="contactPhone" placeholder="+1 (555) 123-4567" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address *</label>
                        <input type="email" class="form-input" id="contactEmail" placeholder="john@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="contactCategory">
                        <option value="family">👨‍👩‍👧 Family</option>
                        <option value="friends">👯 Friends</option>
                        <option value="work">💼 Work</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-input" id="contactAddress" placeholder="123 Main St, City, State">
                </div>

                <div class="form-group">
                    <label class="form-label">Notes</label>
                    <textarea class="form-textarea" id="contactNotes" placeholder="Add any notes..."></textarea>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Save Contact</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ========== CONTACT PROFILE MODAL ========== -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeProfileModal()">&times;</button>
            
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">J</div>
                <h2 class="profile-name" id="profileName">John Doe</h2>
                <span class="profile-category" id="profileCategory">👨‍👩‍👧 Family</span>
            </div>

            <div class="profile-details">
                <div class="profile-detail-item">
                    <div class="profile-detail-label">📱 Phone</div>
                    <div class="profile-detail-value" id="profilePhone">+1 (555) 123-4567</div>
                </div>

                <div class="profile-detail-item">
                    <div class="profile-detail-label">📧 Email</div>
                    <div class="profile-detail-value" id="profileEmail">john@example.com</div>
                </div>

                <div class="profile-detail-item" id="profileAddressSection">
                    <div class="profile-detail-label">📍 Address</div>
                    <div class="profile-detail-value" id="profileAddress">123 Main St</div>
                </div>

                <div class="profile-detail-item" id="profileNotesSection">
                    <div class="profile-detail-label">📝 Notes</div>
                    <div class="profile-detail-value" id="profileNotes">Some notes here</div>
                </div>
            </div>

            <div class="profile-actions">
                <button class="btn btn-primary" onclick="editCurrentContact()">Edit</button>
                <button class="btn btn-danger" onclick="deleteCurrentContact()">Delete</button>
                <button class="btn btn-secondary" onclick="closeProfileModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // ========== STATE MANAGEMENT ==========
        let contacts = [];
        let editingContactId = null;
        let viewingContactId = null;
        let currentTheme = 'light';

        const categoryIcons = {
            family: '👨‍👩‍👧',
            friends: '👯',
            work: '💼'
        };

        const quotes = [
            "Your contacts are your network!",
            "Stay connected with your people.",
            "Organize your relationships.",
            "Build meaningful connections."
        ];

        // ========== INITIALIZATION ==========
        function init() {
            loadContactsFromStorage();
            loadThemePreference();
            renderContacts();
        }

        // ========== CONTACT MANAGEMENT ==========
        function openAddContactModal() {
            editingContactId = null;
            document.getElementById('contactForm').reset();
            document.getElementById('modalTitle').textContent = 'Add New Contact';
            document.getElementById('contactModal').classList.add('active');
            document.getElementById('contactName').focus();
        }

        function closeModal() {
            document.getElementById('contactModal').classList.remove('active');
            editingContactId = null;
        }

        function handleContactSubmit(event) {
            event.preventDefault();

            const name = document.getElementById('contactName').value.trim();
            const phone = document.getElementById('contactPhone').value.trim();
            const email = document.getElementById('contactEmail').value.trim();
            const category = document.getElementById('contactCategory').value;
            const address = document.getElementById('contactAddress').value.trim();
            const notes = document.getElementById('contactNotes').value.trim();

            if (!name || !phone || !email) {
                showToast('Please fill in required fields', 'error');
                return;
            }

            if (editingContactId) {
                const contact = contacts.find(c => c.id === editingContactId);
                contact.name = name;
                contact.phone = phone;
                contact.email = email;
                contact.category = category;
                contact.address = address;
                contact.notes = notes;
                showToast('Contact updated! ✏️', 'success');
            } else {
                const newContact = {
                    id: Date.now(),
                    name,
                    phone,
                    email,
                    category,
                    address,
                    notes,
                    favorite: false,
                    createdAt: new Date()
                };
                contacts.push(newContact);
                showToast('Contact added! ✅', 'success');
            }

            saveContactsToStorage();
            renderContacts();
            closeModal();
        }

        function editContact(contactId) {
            const contact = contacts.find(c => c.id === contactId);
            editingContactId = contactId;
            document.getElementById('contactName').value = contact.name;
            document.getElementById('contactPhone').value = contact.phone;
            document.getElementById('contactEmail').value = contact.email;
            document.getElementById('contactCategory').value = contact.category;
            document.getElementById('contactAddress').value = contact.address || '';
            document.getElementById('contactNotes').value = contact.notes || '';
            document.getElementById('modalTitle').textContent = 'Edit Contact';
            document.getElementById('contactModal').classList.add('active');
        }

        function deleteContact(contactId) {
            if (confirm('Are you sure you want to delete this contact?')) {
                contacts = contacts.filter(c => c.id !== contactId);
                saveContactsToStorage();
                renderContacts();
                showToast('Contact deleted', 'success');
            }
        }

        function editCurrentContact() {
            editContact(viewingContactId);
            closeProfileModal();
        }

        function deleteCurrentContact() {
            deleteContact(viewingContactId);
            closeProfileModal();
        }

        function toggleFavorite(contactId) {
            const contact = contacts.find(c => c.id === contactId);
            contact.favorite = !contact.favorite;
            saveContactsToStorage();
            renderContacts();
            showToast(contact.favorite ? 'Added to favorites ⭐' : 'Removed from favorites', 'success');
        }

        function viewContact(contactId) {
            const contact = contacts.find(c => c.id === contactId);
            viewingContactId = contactId;

            document.getElementById('profileAvatar').textContent = contact.name.charAt(0).toUpperCase();
            document.getElementById('profileName').textContent = contact.name;
            document.getElementById('profileCategory').textContent = `${categoryIcons[contact.category]} ${contact.category.charAt(0).toUpperCase() + contact.category.slice(1)}`;
            document.getElementById('profilePhone').textContent = contact.phone;
            document.getElementById('profileEmail').textContent = contact.email;

            if (contact.address) {
                document.getElementById('profileAddressSection').style.display = 'block';
                document.getElementById('profileAddress').textContent = contact.address;
            } else {
                document.getElementById('profileAddressSection').style.display = 'none';
            }

            if (contact.notes) {
                document.getElementById('profileNotesSection').style.display = 'block';
                document.getElementById('profileNotes').textContent = contact.notes;
            } else {
                document.getElementById('profileNotesSection').style.display = 'none';
            }

            document.getElementById('profileModal').classList.add('active');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('active');
            viewingContactId = null;
        }

        // ========== RENDERING ==========
        function renderContacts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterValue = document.getElementById('filterSelect').value;
            const sortValue = document.getElementById('sortSelect').value;

            let filtered = contacts.filter(contact => {
                const matchesSearch = contact.name.toLowerCase().includes(searchTerm);

                if (filterValue === 'favorites') return matchesSearch && contact.favorite;
                if (['family', 'friends', 'work'].includes(filterValue)) return matchesSearch && contact.category === filterValue;
                return matchesSearch;
            });

            // Sort
            if (sortValue === 'name-asc') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortValue === 'name-desc') {
                filtered.sort((a, b) => b.name.localeCompare(a.name));
            } else if (sortValue === 'recent') {
                filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }

            // Sort favorites to top
            filtered.sort((a, b) => b.favorite - a.favorite);

            const container = document.getElementById('contactsContainer');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📞</div>
                        <h3 class="empty-title">No contacts found</h3>
                        <p class="empty-text">Try adjusting your search or add new contacts</p>
                        <button class="btn btn-primary" onclick="openAddContactModal()">+ Add Contact</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(contact => `
                <div class="contact-card ${contact.favorite ? 'favorite' : ''}">
                    <div class="contact-header">
                        <div onclick="viewContact(${contact.id})" style="cursor: pointer; flex: 1;">
                            <div style="display: flex; align-items: center; gap: 0.8rem;">
                                <div class="contact-avatar">${contact.name.charAt(0).toUpperCase()}</div>
                                <div>
                                    <div class="contact-name">${escapeHtml(contact.name)}</div>
                                    <div class="contact-category">${categoryIcons[contact.category]} ${contact.category.charAt(0).toUpperCase() + contact.category.slice(1)}</div>
                                </div>
                            </div>
                        </div>
                        <button class="contact-favorite-btn" onclick="toggleFavorite(${contact.id})" title="Favorite">
                            ${contact.favorite ? '⭐' : '☆'}
                        </button>
                    </div>

                    <div class="contact-info">
                        <div class="contact-info-item">
                            <span>📱</span>
                            <a href="tel:${contact.phone}" style="color: inherit; text-decoration: none;">${contact.phone}</a>
                        </div>
                        <div class="contact-info-item">
                            <span>📧</span>
                            <a href="mailto:${contact.email}" style="color: inherit; text-decoration: none;">${contact.email}</a>
                        </div>
                        ${contact.address ? `<div class="contact-info-item"><span>📍</span>${escapeHtml(contact.address)}</div>` : ''}
                    </div>

                    <div class="contact-actions">
                        <button class="btn-edit" onclick="viewContact(${contact.id})">View</button>
                        <button class="btn-edit" onclick="editContact(${contact.id})">Edit</button>
                        <button class="btn-delete" onclick="deleteContact(${contact.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // ========== FILTERING & SEARCHING ==========
        document.getElementById('searchInput')?.addEventListener('input', renderContacts);
        document.getElementById('filterSelect')?.addEventListener('change', renderContacts);
        document.getElementById('sortSelect')?.addEventListener('change', renderContacts);

        function switchView(view) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderContacts();
        }

        // ========== THEME MANAGEMENT ==========
        document.getElementById('themeToggle')?.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            currentTheme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
            this.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        });

        function loadThemePreference() {
            currentTheme = localStorage.getItem('theme') || 'light';
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggle').textContent = '☀️';
            }
        }

        // ========== STORAGE ==========
        function saveContactsToStorage() {
            localStorage.setItem('contacts', JSON.stringify(contacts));
        }

        function loadContactsFromStorage() {
            const stored = localStorage.getItem('contacts');
            contacts = stored ? JSON.parse(stored) : [];
        }

        // ========== UTILITIES ==========
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideInUp 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== EVENT DELEGATION ========== 
        document.getElementById('contactModal')?.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('profileModal')?.addEventListener('click', function(e) {
            if (e.target === this) closeProfileModal();
        });

        // ========== INITIALIZATION ==========
        window.addEventListener('load', init);
    </script>
</body>
</html>
