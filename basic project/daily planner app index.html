<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DayCraft Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Georgia',serif;
  background:#f5efe6;
  color:#3b2f2f;
  transition:0.4s;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.sub{
  text-align:center;
  font-size:16px;
  opacity:0.7;
}

/* TOGGLE */
.toggle{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:#fffaf0;
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#6b4f4f;
  color:white;
  cursor:pointer;
  margin-top:5px;
}

/* TASK */
.task{
  background:#f3e8dc;
  padding:10px;
  border-radius:10px;
  margin:8px 0;
  display:flex;
  justify-content:space-between;
}

/* CLOCK */
.clock{
  text-align:center;
  font-size:20px;
  margin-bottom:10px;
}

/* CALENDAR MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#3b2f2f;
  color:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🌸 Hello Prerna 👋</div>
<div class="sub">Your Daily Flow</div>
<div class="toggle" onclick="toggleMode()">🌗</div>

<div class="container">

<!-- CLOCK -->
<div class="card">
  <div class="clock" id="clock"></div>
</div>

<!-- TASK -->
<div class="card">
  <h3>Your Today's Plan</h3>

  <input id="taskInput" placeholder="Add task...">
  <button onclick="addTask()">Add</button>
  <button onclick="openCalendar()">📅 Open Calendar</button>

  <div id="tasks"></div>
</div>

</div>

<!-- CALENDAR -->
<div class="modal" id="calendarModal">
  <div class="modal-content">
    <h3>Select Date</h3>
    <input type="date" id="datePicker">
    <button onclick="setDate()">Set</button>
    <button onclick="closeCalendar()">Close</button>
  </div>
</div>

<script>

let selectedDate = new Date().toDateString();
let tasks = JSON.parse(localStorage.getItem("planner")) || {};
let dark=false;

/* CLOCK */
function updateClock(){
  let now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

/* TOAST */
function toast(msg){
  let t=document.createElement("div");
  t.className="toast";
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

/* ADD TASK */
function addTask(){

  let val = taskInput.value;
  if(!val) return;

  if(!tasks[selectedDate]) tasks[selectedDate]=[];

  tasks[selectedDate].push(val);

  save();
  toast("Task added");
}

/* SAVE */
function save(){
  localStorage.setItem("planner", JSON.stringify(tasks));
  render();
}

/* RENDER */
function render(){

  let box=document.getElementById("tasks");
  box.innerHTML="";

  let todayTasks = tasks[selectedDate] || [];

  todayTasks.forEach((t,i)=>{
    box.innerHTML += `
      <div class="task">
        ${t}
        <button onclick="deleteTask(${i})">✖</button>
      </div>
    `;
  });
}

/* DELETE */
function deleteTask(i){
  tasks[selectedDate].splice(i,1);
  save();
  toast("Task removed");
}

/* CALENDAR */
function openCalendar(){
  calendarModal.style.display="flex";
}

function closeCalendar(){
  calendarModal.style.display="none";
}

function setDate(){
  selectedDate = new Date(datePicker.value).toDateString();
  closeCalendar();
  render();
  toast("Date changed");
}

/* MODE */
function toggleMode(){
  dark=!dark;

  if(dark){
    document.body.style.background="#1e293b";
    document.body.style.color="white";
  } else {
    document.body.style.background="#f5efe6";
    document.body.style.color="#3b2f2f";
  }
}

/* INIT */
render();

</script>

</body>
</html>
