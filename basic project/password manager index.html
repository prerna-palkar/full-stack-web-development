<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Manager</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, button {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
}

button {
  background: #2d89ef;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #1b5fbf;
}

.hidden { display: none; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.actions button {
  width: auto;
  margin-right: 5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Password Manager</h2>

<!-- AUTH SECTION -->
<div id="authSection" class="card">
  <h3>Login / Signup</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
  <p id="authMsg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="card">
    <h3>Add Credential</h3>
    <input id="site" placeholder="Website/App">
    <input id="user" placeholder="Username/Email">
    <input id="pass" placeholder="Password">
    <button onclick="generatePassword()">Generate Strong Password</button>
    <button onclick="saveCredential()">Save</button>
  </div>

  <div class="card">
    <h3>Saved Passwords</h3>
    <input id="search" placeholder="Search..." onkeyup="loadData()">
    <table>
      <thead>
        <tr>
          <th>Site</th>
          <th>User</th>
          <th>Password</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="dataTable"></tbody>
    </table>
  </div>

  <button onclick="logout()">Logout</button>

</div>

</div>

<script>
let currentUser = "";

// Base64 encode/decode (simple security simulation)
function encode(data){ return btoa(data); }
function decode(data){ return atob(data); }

// Signup
function signup(){
  let u = username.value;
  let p = password.value;

  if(!u || !p) return alert("Fill all fields");

  localStorage.setItem("user_"+u, encode(p));
  authMsg.innerText = "Signup successful!";
}

// Login
function login(){
  let u = username.value;
  let p = password.value;

  let stored = localStorage.getItem("user_"+u);

  if(stored && decode(stored) === p){
    currentUser = u;
    authSection.classList.add("hidden");
    dashboard.classList.remove("hidden");
    loadData();
  } else {
    authMsg.innerText = "Invalid credentials!";
  }
}

// Logout
function logout(){
  location.reload();
}

// Save Credential
function saveCredential(){
  let siteVal = site.value;
  let userVal = user.value;
  let passVal = pass.value;

  if(!siteVal || !userVal || !passVal) return alert("Fill all fields");

  let data = JSON.parse(localStorage.getItem("vault_"+currentUser)) || [];

  data.push({
    site: siteVal,
    user: userVal,
    pass: encode(passVal)
  });

  localStorage.setItem("vault_"+currentUser, JSON.stringify(data));

  site.value = user.value = pass.value = "";
  loadData();
}

// Load Data
function loadData(){
  let data = JSON.parse(localStorage.getItem("vault_"+currentUser)) || [];
  let searchVal = search.value.toLowerCase();

  dataTable.innerHTML = "";

  data.forEach((item, index)=>{
    if(item.site.toLowerCase().includes(searchVal)){
      let row = `
      <tr>
        <td>${item.site}</td>
        <td>${item.user}</td>
        <td>****</td>
        <td class="actions">
          <button onclick="viewPass(${index})">View</button>
          <button onclick="copyPass(${index})">Copy</button>
          <button onclick="deleteItem(${index})">Delete</button>
        </td>
      </tr>
      `;
      dataTable.innerHTML += row;
    }
  });
}

// View Password
function viewPass(i){
  let data = JSON.parse(localStorage.getItem("vault_"+currentUser));
  alert("Password: " + decode(data[i].pass));
}

// Copy Password
function copyPass(i){
  let data = JSON.parse(localStorage.getItem("vault_"+currentUser));
  navigator.clipboard.writeText(decode(data[i].pass));
  alert("Copied!");
}

// Delete
function deleteItem(i){
  let data = JSON.parse(localStorage.getItem("vault_"+currentUser));
  data.splice(i,1);
  localStorage.setItem("vault_"+currentUser, JSON.stringify(data));
  loadData();
}

// Generate Strong Password
function generatePassword(){
  let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%";
  let passGen = "";
  for(let i=0;i<12;i++){
    passGen += chars[Math.floor(Math.random()*chars.length)];
  }
  pass.value = passGen;
}
</script>

</body>
</html>
