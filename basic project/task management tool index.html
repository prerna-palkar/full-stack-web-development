<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editorial Task Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background:#f5f6f8;
  color:#111;
}

/* LAYOUT */
.wrapper{
  display:flex;
  height:100vh;
}

/* SIDEBAR (NOTION STYLE) */
.sidebar{
  width:240px;
  background:#111;
  color:white;
  padding:15px;
}

.logo{
  font-size:18px;
  font-weight:bold;
  margin-bottom:20px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu div{
  padding:8px;
  cursor:pointer;
  opacity:0.8;
}

.menu div:hover{
  opacity:1;
  background:#222;
  border-radius:6px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOP BAR */
.topbar{
  background:white;
  padding:12px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
}

/* INPUT */
.input-area{
  display:flex;
  gap:10px;
}

input, select{
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  outline:none;
}

button{
  padding:8px 12px;
  border:none;
  background:#111;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* CONTENT */
.content{
  display:flex;
  height:100%;
}

/* TASK LIST */
.task-list{
  width:40%;
  background:#fafafa;
  border-right:1px solid #ddd;
  overflow:auto;
}

.task{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.task:hover{
  background:#f0f0f0;
}

.task h4{
  margin:0;
  font-size:14px;
}

.small{
  font-size:12px;
  color:#666;
}

/* DETAIL PANEL */
.detail{
  flex:1;
  padding:20px;
}

.priority{
  font-size:12px;
  padding:3px 8px;
  border-radius:4px;
  display:inline-block;
}

.high{background:#ffe5e5;color:#c00;}
.medium{background:#fff3cd;color:#856404;}
.low{background:#e7f7ea;color:#1b7a2a;}

.done{
  text-decoration:line-through;
  opacity:0.6;
}

/* ACTION */
.actions{
  margin-top:15px;
  display:flex;
  gap:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🗂 Task Editorial</div>
  <div class="menu">
    <div>Dashboard</div>
    <div>Today</div>
    <div>Important</div>
    <div>Completed</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOP -->
<div class="topbar">
  <div class="input-area">
    <input id="task" placeholder="New task...">
    <select id="priority">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
    <button onclick="add()">Add</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- TASK LIST -->
<div class="task-list" id="list"></div>

<!-- DETAIL -->
<div class="detail" id="detail">
  <h2>Task Details</h2>
  <p>Select a task to view details</p>
</div>

</div>

</div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("editor_tasks")) || [];
let selected = null;

/* ADD */
function add(){
  let t=document.getElementById("task").value;
  let p=document.getElementById("priority").value;

  if(!t) return;

  tasks.push({
    text:t,
    priority:p,
    done:false,
    time:new Date().toLocaleString()
  });

  save();
  render();
  document.getElementById("task").value="";
}

/* SELECT */
function select(i){
  selected=i;
  renderDetail();
}

/* TOGGLE */
function toggle(i){
  tasks[i].done=!tasks[i].done;
  save();
  render();
}

/* DELETE */
function del(i){
  tasks.splice(i,1);
  save();
  render();
}

/* SAVE */
function save(){
  localStorage.setItem("editor_tasks",JSON.stringify(tasks));
}

/* RENDER LIST */
function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  tasks.forEach((t,i)=>{
    list.innerHTML+=`
      <div class="task ${t.done?'done':''}" onclick="select(${i})">
        <h4>${t.text}</h4>
        <div class="small">${t.time}</div>
      </div>
    `;
  });
}

/* DETAIL VIEW */
function renderDetail(){
  let d=document.getElementById("detail");
  if(selected===null) return;

  let t=tasks[selected];

  d.innerHTML=`
    <h2 class="${t.done?'done':''}">${t.text}</h2>

    <span class="priority ${t.priority}">
      ${t.priority.toUpperCase()}
    </span>

    <p>Created: ${t.time}</p>

    <div class="actions">
      <button onclick="toggle(${selected})">Toggle Done</button>
      <button onclick="del(${selected})">Delete</button>
    </div>
  `;
}

/* INIT */
render();
</script>

</body>
</html>
